<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>CRUD Productos</title>
    <link rel="stylesheet" th:href="@{/css/cruds.css}">
</head>
<body>

<div class="main-container">
    <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px;">
        <div style="width: 150px;"></div>
        <h1 style="margin: 0; flex-grow: 1; text-align: center;">GESTIÓN DE PRODUCTOS</h1>
        <div style="width: 150px; text-align: right;">
            <a th:href="@{/home}" style="text-decoration: none;">
                <button type="button" class="btn-principal"
                        style="width: auto; padding: 8px 15px; font-size: 13px; background-color: #1a73e8; border-radius: 20px;">
                    ← Regresar al Menú
                </button>
            </a>
        </div>
    </div>

    <div class="tabla-wrapper">
        <table>
            <thead>
            <tr>
                <th>ID</th>
                <th>Nombre</th>
                <th>Precio</th>
                <th>Stock</th>
                <th>Categoría</th>
                <th>Acción</th>
            </tr>
            </thead>
            <tbody>
            <tr th:each="p : ${productos}">
                <td th:text="${p.idProducto}"></td>
                <td th:text="${p.nombreProducto}"></td>
                <td th:text="${p.precioProducto}"></td>
                <td th:text="${p.stock}"></td>
                <td th:text="${p.categoria.nombreCategoria}"></td>
                <td>
                    <button class="btn-editar-tabla" type="button"
                            th:data-id="${p.idProducto}"
                            th:data-nombre="${p.nombreProducto}"
                            th:data-precio="${p.precioProducto}"
                            th:data-stock="${p.stock}"
                            th:data-categoria="${p.categoria.idCategoria}"
                            onclick="prepararEdicionProductos(this)">Editar</button>
                    <button class="btn-eliminar-tabla" th:onclick="'eliminar(' + ${p.idProducto} + ')'">Eliminar</button>
                </td>
            </tr>
            </tbody>
        </table>
    </div>

    <div class="acciones-container">
        <button class="btn-secundario" onclick="location.reload()">Actualizar</button>
        <button class="btn-principal" onclick="abrirNuevoProducto()">Nuevo Producto</button>
    </div>
</div>

<div id="modal" class="modal">
    <div class="modal-contenido">
        <span class="cerrar" onclick="cerrarModal()">&times;</span>
        <h2 id="modal-titulo">Nuevo Producto</h2>
        <form th:action="@{/productos/guardar}" method="post" th:object="${producto}" id="productoForm">
            <input type="hidden" id="idProducto" th:field="*{idProducto}">

            <label>Nombre del Producto:</label>
            <input type="text" th:field="*{nombreProducto}" id="nombreProducto" required>

            <label>Precio:</label>
            <input type="number" step="0.01" th:field="*{precioProducto}" id="precioProducto" required>

            <label>Stock:</label>
            <input type="number" th:field="*{stock}" id="stock" required>

            <label>Categoría:</label>
            <select th:field="*{categoria.idCategoria}" id="idCategoria" required style="width: 100%; padding: 10px; margin-bottom: 15px; border-radius: 5px; border: 1px solid #ccc;">
                <option th:each="cat : ${categorias}"
                        th:value="${cat.idCategoria}"
                        th:text="${cat.nombreCategoria}"></option>
            </select>

            <button type="submit" class="btn-principal" style="width: 100%; margin-top: 10px;">Guardar</button>
        </form>
    </div>
</div>

<script th:src="@{/js/script.js}"></script>
</body>
</html>
