<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>CRUD Categorías</title>
    <link rel="stylesheet" th:href="@{/css/cruds.css}">
</head>
<body>

<div class="main-container">
    <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px;">
        <div style="width: 150px;"></div>
        <h1 style="margin: 0; flex-grow: 1; text-align: center;">GESTIÓN DE CATEGORÍAS</h1>
        <div style="width: 150px; text-align: right;">
            <a th:href="@{/home}" style="text-decoration: none;">
                <button type="button" class="btn-principal" style="width: auto; padding: 8px 15px; font-size: 13px; background-color: #1a73e8; border-radius: 20px;">
                    ← Regresar al Menú
                </button>
            </a>
        </div>
    </div>

    <div class="tabla-wrapper">
        <table>
            <thead>
            <tr>
                <th>ID</th>
                <th>Nombre</th>
                <th>Descripción</th>
                <th>Acción</th>
            </tr>
            </thead>
            <tbody>
            <tr th:each="c : ${categorias}">
                <td th:text="${c.idCategoria}"></td>
                <td th:text="${c.nombreCategoria}"></td>
                <td th:text="${c.descripcionCategoria}"></td>
                <td>
                    <button class="btn-editar-tabla" type="button"
                            th:data-id="${c.idCategoria}"
                            th:data-nombre="${c.nombreCategoria}"
                            th:data-descripcion="${c.descripcionCategoria}"
                            onclick="prepararEdicionCategorias(this)">Editar</button>
                    <button class="btn-eliminar-tabla" th:onclick="'eliminarCategoria(' + ${c.idCategoria} + ')'">Eliminar</button>
                </td>
            </tr>
            </tbody>
        </table>
    </div>

    <div class="acciones-container">
        <button class="btn-secundario" onclick="location.reload()">Actualizar</button>
        <button class="btn-principal" onclick="abrirNuevaCategoria()">Nueva Categoría</button>
    </div>
</div>

<div id="modal" class="modal">
    <div class="modal-contenido">
        <span class="cerrar" onclick="cerrarModal()">&times;</span>
        <h2 id="modal-titulo">Nueva Categoría</h2>
        <form th:action="@{/categorias/guardar}" method="post" th:object="${categoria}" id="categoriaForm">
            <input type="hidden" id="idCategoriaModal" th:field="*{idCategoria}">

            <label>Nombre de Categoría:</label>
            <input type="text" th:field="*{nombreCategoria}" id="nombreCategoria" required>

            <label>Descripción:</label>
            <input type="text" th:field="*{descripcionCategoria}" id="descripcionCategoria">

            <button type="submit" class="btn-principal" style="width: 100%; margin-top: 10px;">Guardar</button>
        </form>
    </div>
</div>

<script th:src="@{/js/script.js}"></script>
</body>
</html>
