<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>CRUD Detalle Pedido</title>
    <link rel="stylesheet" th:href="@{/css/cruds.css}">
</head>
<body>

<div class="main-container">
    <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px;">
        <div style="width: 150px;"></div>
        <h1 style="margin: 0; flex-grow: 1; text-align: center;">DETALLES DE PEDIDOS</h1>
        <div style="width: 150px; text-align: right;">
            <a th:href="@{/home}" style="text-decoration: none;">
                <button type="button" class="btn-principal" style="width: auto; padding: 8px 15px; font-size: 13px; background-color: #1a73e8; border-radius: 20px;">
                    ← Regresar al Menú
                </button>
            </a>
        </div>
    </div>

    <div class="tabla-wrapper">
        <table>
            <thead>
            <tr>
                <th>ID</th>
                <th>Pedido ID</th>
                <th>Producto</th>
                <th>Cantidad</th>
                <th>Precio Unit.</th>
                <th>Subtotal</th>
                <th>Acción</th>
            </tr>
            </thead>
            <tbody>
            <tr th:each="d : ${detallepedidos}">
                <td th:text="${d.idDetalle}"></td>
                <td th:text="${d.pedido.idPedido}"></td>
                <td th:text="${d.producto.nombreProducto}"></td>
                <td th:text="${d.cantidad}"></td>
                <td th:text="${'Q' + d.precioUnitario}"></td>
                <td th:text="${'Q' + (d.cantidad * d.precioUnitario)}"></td>
                <td>
                    <button class="btn-editar-tabla" type="button"
                            th:data-id="${d.idDetalle}"
                            th:data-pedido="${d.pedido.idPedido}"
                            th:data-producto="${d.producto.idProducto}"
                            th:data-cantidad="${d.cantidad}"
                            th:data-precio="${d.precioUnitario}"
                            onclick="prepararEdicionDetalles(this)">Editar</button>
                    <button class="btn-eliminar-tabla" th:onclick="'eliminarDetalle(' + ${d.idDetalle} + ')'">Eliminar</button>
                </td>
            </tr>
            </tbody>
        </table>
    </div>

    <div class="acciones-container">
        <button class="btn-secundario" onclick="location.reload()">Actualizar</button>
        <button class="btn-principal" onclick="abrirNuevoDetalle()">Nuevo Detalle</button>
    </div>
</div>

<div id="modal" class="modal">
    <div class="modal-contenido">
        <span class="cerrar" onclick="cerrarModal()">&times;</span>
        <h2 id="modal-titulo">Nuevo Detalle</h2>
        <form th:action="@{/detallepedidos/guardar}" method="post" th:object="${detallePedido}" id="detalleForm">
            <input type="hidden" id="idDetalle" th:field="*{idDetalle}">

            <label>Seleccionar Pedido:</label>
            <select th:field="*{pedido.idPedido}" id="idPedidoDetalle" required style="width: 100%; padding: 10px; margin-bottom: 15px; border-radius: 5px; border: 1px solid #ccc;">
                <option th:each="p : ${pedidos}" th:value="${p.idPedido}" th:text="'Pedido #' + ${p.idPedido}"></option>
            </select>

            <label>Seleccionar Producto:</label>
            <select th:field="*{producto.idProducto}" id="idProductoDetalle" required style="width: 100%; padding: 10px; margin-bottom: 15px; border-radius: 5px; border: 1px solid #ccc;">
                <option th:each="prod : ${productos}" th:value="${prod.idProducto}" th:text="${prod.nombreProducto}"></option>
            </select>

            <label>Cantidad:</label>
            <input type="number" th:field="*{cantidad}" id="cantidadDetalle" required>

            <label>Precio Unitario:</label>
            <input type="number" step="0.01" th:field="*{precioUnitario}" id="precioUnitarioDetalle" required>

            <button type="submit" class="btn-principal" style="width: 100%; margin-top: 10px;">Guardar Detalle</button>
        </form>
    </div>
</div>

<script th:src="@{/js/script.js}"></script>
</body>
</html>
