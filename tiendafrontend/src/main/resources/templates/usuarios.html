<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>CRUD Usuarios</title>
    <link rel="stylesheet" th:href="@{/css/styles.css}">
</head>
<body>

<h1>Gestión de Usuarios</h1>

<button onclick="abrirModal()">Nuevo Usuario</button>

<table>
    <thead>
        <tr>
            <th>ID</th>
            <th>Nombre</th>
            <th>Apellido</th>
            <th>Edad</th>
            <th>Acciones</th>
        </tr>
    </thead>
    <tbody>
        <tr th:each="u : ${usuarios}">
            <td th:text="${u.idUsuario}"></td>
            <td th:text="${u.nombreUsuario}"></td>
            <td th:text="${u.apellidoUsuario}"></td>
            <td th:text="${u.edadUsuario}"></td>
            <td>
                <button th:onclick="|eliminar(${u.idUsuario})|">Eliminar</button>
            </td>
        </tr>
    </tbody>
</table>

<!-- MODAL -->
<div id="modal" class="modal">
    <div class="modal-contenido">
        <span class="cerrar" onclick="cerrarModal()">&times;</span>

        <h2>Nuevo Usuario</h2>

        <form th:action="@{/usuarios/guardar}" method="post" th:object="${usuario}">
            <input type="text" th:field="*{nombreUsuario}" placeholder="Nombre" required>
            <input type="text" th:field="*{apellidoUsuario}" placeholder="Apellido" required>
            <input type="number" th:field="*{edadUsuario}" placeholder="Edad" required>

            <button type="submit">Guardar</button>
        </form>
    </div>
</div>

<script th:src="@{/js/script.js}"></script>

</body>
</html>
