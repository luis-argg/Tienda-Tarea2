<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>CRUD Pedidos</title>
    <link rel="stylesheet" th:href="@{/css/cruds.css}">
</head>
<body>

<div class="main-container">
    <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px;">
        <div style="width: 150px;"></div>
        <h1 style="margin: 0; flex-grow: 1; text-align: center;">GESTIÓN DE PEDIDOS</h1>
        <div style="width: 150px; text-align: right;">
            <a th:href="@{/home}" style="text-decoration: none;">
                <button type="button" class="btn-principal" style="width: auto; padding: 8px 15px; font-size: 13px; background-color: #1a73e8; border-radius: 20px;">
                    ← Regresar al Menú
                </button>
            </a>
        </div>
    </div>

    <div class="tabla-wrapper">
        <table>
            <thead>
            <tr>
                <th>ID</th>
                <th>Fecha</th>
                <th>Total</th>
                <th>Usuario</th>
                <th>Acción</th>
            </tr>
            </thead>
            <tbody>
            <tr th:each="p : ${pedidos}">
                <td th:text="${p.idPedido}"></td>
                <td th:text="${p.fechaPedido}"></td>
                <td th:text="${'Q' + p.totalPedido}"></td>
                <td th:text="${p.usuario.nombreUsuario + ' ' + p.usuario.apellidoUsuario}"></td>
                <td>
                    <button class="btn-editar-tabla" type="button"
                            th:data-id="${p.idPedido}"
                            th:data-fecha="${p.fechaPedido}"
                            th:data-total="${p.totalPedido}"
                            th:data-usuario="${p.usuario.idUsuario}"
                            onclick="prepararEdicionPedidos(this)">Editar</button>
                    <button class="btn-eliminar-tabla" th:onclick="'eliminarPedido(' + ${p.idPedido} + ')'">Eliminar</button>
                </td>
            </tr>
            </tbody>
        </table>
    </div>

    <div class="acciones-container">
        <button class="btn-secundario" onclick="location.reload()">Actualizar</button>
        <button class="btn-principal" onclick="abrirNuevoPedido()">Nuevo Pedido</button>
    </div>
</div>

<div id="modal" class="modal">
    <div class="modal-contenido">
        <span class="cerrar" onclick="cerrarModal()">&times;</span>
        <h2 id="modal-titulo">Nuevo Pedido</h2>
        <form th:action="@{/pedidos/guardar}" method="post" th:object="${pedido}" id="pedidoForm">
            <input type="hidden" id="idPedido" th:field="*{idPedido}">

            <label>Fecha del Pedido:</label>
            <input type="date" th:field="*{fechaPedido}" id="fechaPedido" required style="width: 100%; padding: 10px; margin-bottom: 15px; border-radius: 5px; border: 1px solid #ccc;">

            <label>Total:</label>
            <input type="number" step="0.01" th:field="*{totalPedido}" id="totalPedido" required>

            <label>Usuario que realiza el pedido:</label>
            <select th:field="*{usuario.idUsuario}" id="idUsuarioPedido" required style="width: 100%; padding: 10px; margin-bottom: 15px; border-radius: 5px; border: 1px solid #ccc;">
                <option th:each="u : ${usuarios}"
                        th:value="${u.idUsuario}"
                        th:text="${u.nombreUsuario + ' ' + u.apellidoUsuario}"></option>
            </select>

            <button type="submit" class="btn-principal" style="width: 100%; margin-top: 10px;">Guardar Pedido</button>
        </form>
    </div>
</div>

<script th:src="@{/js/script.js}"></script>
</body>
</html>
